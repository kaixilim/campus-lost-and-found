<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Found Item – Campus Lost & Found</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="home-nav">
    <div class="nav-brand">🔍 Lost & Found</div>
    <div class="home-nav-center">
        <a href="homepage.html">Home</a>
        <a href="lost.html">Lost Items</a>
        <a href="found.html">Found Items</a>
        <a href="lostForm.html">Report Lost</a>
        <a href="foundForm.html" class="active">Report Found</a>
    </div>
    <button onclick="logout()" class="logout-btn">Logout</button>
</nav>

<div class="page-wrapper">
    <div class="form-container">
        <h1>📦 Report Found Item</h1>
        <p>Found something on campus? Help return it to its owner.</p>

        <form id="itemForm">
            <input type="hidden" name="status" value="Found">

            <div class="form-group">
                <label for="title">Item Title *</label>
                <input type="text" id="title" name="title" placeholder="e.g. iPhone 13" required maxlength="255">
            </div>

            <div class="form-group">
                <label for="description">Description *</label>
                <textarea id="description" name="description" placeholder="Describe the item in detail…" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" name="category" required>
                    <option value="">-- Select Category --</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Accessories">Accessories</option>
                    <option value="Document">Document</option>
                    <option value="Bag">Bag</option>
                    <option value="Keys">Keys</option>
                    <option value="Wallet">Wallet</option>
                    <option value="Stationary">Stationary</option>
                    <option value="Others">Others</option>
                </select>
            </div>

            <div class="form-group">
                <label for="location">Found Location *</label>
                <input type="text" id="location" name="location" placeholder="e.g. Cafeteria, Parking Lot" required>
            </div>

            <div class="form-group">
                <label for="date">Date Found *</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="contact">Contact Number *</label>
                <input type="text" id="contact" name="contact" placeholder="e.g. 0198877665" required maxlength="15">
                <small>Must be 10–15 digits. No spaces or dashes needed.</small>
            </div>

            <div class="form-group">
                <label for="email">Contact Email <span class="optional">(Optional)</span></label>
                <input type="email" id="email" name="email" placeholder="e.g. yourname@email.com">
            </div>

            <button type="submit" class="btn-primary btn-full">Submit Report</button>
        </form>
    </div>
</div>

<script src="script.js" defer></script>
</body>
</html>
