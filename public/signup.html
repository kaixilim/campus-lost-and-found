<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – Campus Lost & Found</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-logo">🔍</div>
    <h1>Create Account</h1>
    <p>Join the Campus Lost & Found system</p>

    <form id="signupForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn-primary btn-full">Sign Up</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
</div>

<script src="script.js" defer></script>
</body>
</html>
